services:
  - type: web
    name: memo-app-api
    runtime: node
    buildCommand: npm install && node scripts/with-database-url.js npx prisma generate
    startCommand: node scripts/with-database-url.js node scripts/prisma-deploy-safe.js && node scripts/with-database-url.js node server/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
